---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common.names.fullname" . }}-deployment
  namespace: {{ include "common.names.namespace" . }}
  labels:
    app: webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webui
  template:
    metadata:
      labels:
        app: webui
    spec:
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              echo "Esperando Mongo em {{ .Release.Name }}-db-service:27017...";
              until nc -z {{ .Release.Name }}-db-service {{ .Values.global.containerPorts.db }}; do
                echo "Mongo indisponível, aguardando...";
                sleep 3;
              done;
              echo "Mongo OK";
      containers:
      - name: {{ include "common.names.fullname" . }}
        image: {{ template "webui.image" . }}
        args: ["run", "dev"]
        env:
        - name: DB_URI
          {{- if eq .Release.Name "db" }}
          value: "mongodb://db-service/open5gs"
          {{- else }}
          value: "mongodb://{{ .Release.Name }}-db-service/open5gs"
          {{- end }}
        - name: HOSTNAME
          value: "0.0.0.0"
        - name: PORT
          value: {{ .Values.global.containerPorts.webui | quote }}
        - name: NODE_ENV
          value: "dev"
        ports:
        - name: webui
          containerPort: {{ .Values.global.containerPorts.webui }}

