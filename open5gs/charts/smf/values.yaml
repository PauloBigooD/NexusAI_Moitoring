# Default values for smf

image:
  registry: docker.io
  repository: flavioandrade/smf
  tag: "latest"
  pullPolicy: IfNotPresent

services:
  pfcp:
    type: ClusterIP
    #type: LoadBalancer
    #loadBalancerIP: 10.33.0.3
    #provider: MetalLB

config: {}

global:
  networkFunctions:
    upf: []
  containerPorts:
    sbi: 80
  mobileNetwork:
    dataNetwork:
      subnet: 10.45.0.0/16
      gateway: 10.45.0.1
      dnn: lance
